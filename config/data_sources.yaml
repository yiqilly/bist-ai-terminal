# ============================================================
# config/data_sources.yaml
# Veri Kaynağı Konfigürasyonu
# ============================================================

# Aktif kaynak: mock | borsapy | matriks | csv
active_source: borsapy

# ── Semboller ────────────────────────────────────────────────
symbols:
  - AKBNK
  - THYAO
  - EREGL
  - FROTO
  - ISCTR
  - KCHOL
  - BIMAS
  - SAHOL
  - ASELS
  - TUPRS
  - GARAN
  - YKBNK
  - SISE
  - SASA
  - PETKM
  - TCELL
  - KOZAL
  - KOZAA
  - HALKB
  - VESTL
  - ENKAI
  - ARCLK
  - KRDMD
  - OTKAR
  - DOHOL
  - GUBRF
  - ALARK
  - BRYAT
  - CIMSA
  - TOASO

# ── Bar zaman dilimleri ──────────────────────────────────────
timeframes:
  - 1m
  - 5m

# ── borsapy TradingViewStream ayarları ──────────────────────
borsapy:
  max_ticks_per_second: 10
  wait_for_quote_timeout: 10.0
  reconnect_backoff: [1, 3, 5, 10]
  max_reconnect_attempts: 0
  session: ""
  session_sign: ""

# ── Bar builder ayarları ─────────────────────────────────────
bar_builder:
  timeframes: [1m, 5m]
  max_bars_in_memory: 200

# ── Loglama ─────────────────────────────────────────────────
logging:
  level: INFO
  file: logs/collector.log
  max_bytes: 5242880
  backup_count: 3
