<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BIST Signal Mini App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--tg-theme-bg-color);
            color: var(--tg-theme-text-color);
            margin: 0;
            padding: 20px;
        }
        .card {
            background-color: var(--tg-theme-secondary-bg-color);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .signal-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .buy { color: #31b545; font-weight: bold; }
        .sell { color: #e53935; font-weight: bold; }
        button {
            background-color: var(--tg-theme-button-color);
            color: var(--tg-theme-button-text-color);
            border: none;
            border-radius: 8px;
            padding: 10px 20px;
            width: 100%;
            font-size: 16px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h1>BIST Canlı Sinyaller</h1>
    
    <div id="signals-container">
        <!-- Sinyaller buraya gelecek -->
        <div class="card">
            <div class="signal-row">
                <span><strong>THYAO</strong></span>
                <span class="buy">AL</span>
            </div>
            <p style="font-size: 12px; margin: 5px 0;">Fiyat: 285.50 | Güven: %85</p>
        </div>
    </div>

    <button onclick="refreshSignals()">Sinyalleri Yenile</button>

    <script>
        // Telegram Web App API başlatma
        const tg = window.Telegram.WebApp;
        tg.expand(); // Uygulamayı tam ekran yap

        function refreshSignals() {
            tg.MainButton.setText("Yükleniyor...").show();
            // Burada backend API'sine istek atılır
            setTimeout(() => {
                tg.MainButton.hide();
                tg.showAlert("Sinyaller güncellendi!");
            }, 1000);
        }
    </script>
</body>
</html>
