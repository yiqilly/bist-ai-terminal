<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BIST Terminal | Profesyonel İşlem Masası</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0e14;
            --card-bg: #151c27;
            --accent: #00d2ff;
            --text: #e0e6ed;
            --text-muted: #94a3b8;
            --success: #10b981;
            --danger: #ef4444;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        header {
            width: 100%;
            padding: 40px 0;
            text-align: center;
            background: linear-gradient(180deg, rgba(0, 210, 255, 0.1) 0%, rgba(10, 14, 20, 0) 100%);
        }

        h1 {
            font-size: 3rem;
            font-weight: 800;
            margin: 0;
            background: linear-gradient(90deg, #fff, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 1.1rem;
            margin-top: 10px;
        }

        .container {
            max-width: 1000px;
            width: 90%;
            margin-top: 50px;
        }

        .glass-card {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            position: relative;
            overflow: hidden;
        }

        .glass-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .stat-box {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: transform 0.3s ease;
        }

        .stat-box:hover {
            transform: translateY(-5px);
            border-color: var(--accent);
        }

        .tag {
            font-size: 0.75rem;
            text-transform: uppercase;
            font-weight: 600;
            color: var(--accent);
            margin-bottom: 8px;
            display: block;
        }

        .val {
            font-size: 1.5rem;
            font-weight: 600;
        }

        .footer {
            margin: 60px 0;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .btn-primary {
            background: var(--accent);
            color: #000;
            padding: 12px 30px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 600;
            display: inline-block;
            margin-top: 30px;
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.5);
            transform: scale(1.05);
        }

        /* Küçük Animasyon */
        @keyframes pulse {
            0% { opacity: 0.5; }
            50% { opacity: 1; }
            100% { opacity: 0.5; }
        }
        .live-dot {
            height: 8px;
            width: 8px;
            background-color: var(--success);
            border-radius: 50%;
            display: inline-block;
            margin-right: 8px;
            animation: pulse 2s infinite;
        }
    </style>
</head>
<body>

    <header>
        <h1>BIST TERMINAL</h1>
        <p class="subtitle">AI Destekli Borsa Analiz ve Sinyal Merkezi</p>
    </header>

    <div class="container">
        <div class="glass-card">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <h2 style="margin: 0;">Market Durumu</h2>
                <span><span class="live-dot"></span>Canlı Veri Aktif</span>
            </div>
            
            <div class="grid">
                <div class="stat-box">
                    <span class="tag">BIST 100</span>
                    <div class="val">9,145.20 <span style="color: var(--success); font-size: 0.9rem;">+1.2%</span></div>
                </div>
                <div class="stat-box">
                    <span class="tag">Aktif Sinyaller</span>
                    <div class="val">12 <span style="color: var(--accent); font-size: 0.9rem;">Yeni Öneri</span></div>
                </div>
                <div class="stat-box">
                    <span class="tag">AI Güven Skoru</span>
                    <div class="val">88.4 / 100</div>
                </div>
            </div>

            <div style="text-align: center;">
                <a href="#" class="btn-primary" onclick="loadSignals()">Sinyalleri Manuel Yenile</a>
            </div>
        </div>
    </div>

    <div class="footer">
        &copy; 2026 BIST Terminal | <span id="last-update">Veriler bekleniyor...</span>
    </div>

    <script>
        async function updateDashboard() {
            // Canlı Bulut API Adresiniz
            const api_url = "https://bist-ai-terminal.onrender.com/api/status"; 
            
            try {
                const res = await fetch(api_url);
                const data = await res.json();
                
                console.log("Veriler GitHub'dan okundu:", data);
                
                // Arayüzü güncelle
                document.getElementById('last-update').innerText = "Son Güncelleme: " + data.last_update;
                
                // Sinyal Listesini Oluştur
                const signalList = document.querySelector('.signal-list');
                signalList.innerHTML = ''; // Mevcutları temizle
                
                data.signals.forEach(sig => {
                    const row = document.createElement('div');
                    row.className = 'signal-row';
                    row.innerHTML = `
                        <span>${sig.symbol}</span>
                        <span>${sig.price} TL</span>
                        <span style="color: ${sig.change >= 0 ? '#00ff88' : '#ff4444'}">${sig.change >= 0 ? '+' : ''}${sig.change}%</span>
                        <span class="badge ${sig.action === 'AL' ? 'badge-primary' : 'badge-secondary'}">${sig.action}</span>
                    `;
                    signalList.appendChild(row);
                });
                
            } catch (err) {
                console.error("Veri okuma hatası:", err);
            }
        }

        // Dakikada bir kontrol et
        setInterval(updateDashboard, 60000);
        updateDashboard();
    </script>
</body>
</html>
