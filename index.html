<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BIST Terminal | Web Cockpit v1</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0e14;
            --panel-bg: #111827;
            --card-bg: #151c27;
            --accent: #00d2ff;
            --text: #e0e6ed;
            --text-dim: #94a3b8;
            --success: #4ade80;
            --warning: #fbbf24;
            --danger: #ef4444;
            --border: rgba(255, 255, 255, 0.05);
            --font-mono: 'Consolas', 'Courier New', monospace;
        }

        * { box-sizing: border-box; }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ── Top Bar ── */
        header {
            background: #0f172a;
            border-bottom: 1px solid var(--border);
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo { font-weight: 800; font-size: 1.1rem; color: var(--accent); letter-spacing: 1px; }

        .market-meta { display: flex; gap: 20px; font-family: var(--font-mono); font-size: 0.85rem; }
        .regime-tag { font-weight: bold; }

        /* ── Main Layout ── */
        .cockpit-grid {
            display: grid;
            grid-template-columns: 1fr 320px;
            flex: 1;
            overflow: hidden;
        }

        /* ── Left Side: Signals ── */
        .workspace {
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--border);
            overflow: hidden;
        }

        .tabs-header {
            display: flex;
            background: #0f172a;
            padding: 0 10px;
            border-bottom: 1px solid var(--border);
        }

        .tab-btn {
            padding: 12px 20px;
            cursor: pointer;
            font-family: var(--font-mono);
            font-size: 0.8rem;
            color: var(--text-dim);
            border-bottom: 2px solid transparent;
            transition: 0.2s;
        }

        .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); background: rgba(0, 210, 255, 0.05); }

        .table-container { flex: 1; overflow-y: auto; background: var(--panel-bg); }

        table { width: 100%; border-collapse: collapse; font-family: var(--font-mono); font-size: 0.85rem; }
        th { text-align: left; padding: 10px; background: #0f172a; position: sticky; top: 0; border-bottom: 1px solid var(--border); color: var(--text-dim); }
        td { padding: 12px 10px; border-bottom: 1px solid rgba(255,255,255,0.02); }
        tr:hover { background: rgba(255, 255, 255, 0.03); cursor: pointer; }
        tr.selected { background: rgba(0, 210, 255, 0.1); }

        .badge { padding: 2px 6px; border-radius: 4px; font-weight: bold; font-size: 0.75rem; }
        .q-aplus { color: var(--success); }
        .q-a { color: #86efac; }
        .q-b { color: var(--warning); }

        /* ── Right Side: Details ── */
        .details-panel {
            background: var(--bg);
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .detail-card {
            background: var(--panel-bg);
            border-radius: 12px;
            padding: 15px;
            border: 1px solid var(--border);
        }

        .detail-header { border-bottom: 1px solid var(--border); margin-bottom: 15px; padding-bottom: 10px; }
        .detail-header h3 { margin: 0; font-size: 1.2rem; display: flex; justify-content: space-between; }

        .metric-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; font-family: var(--font-mono); }
        .metric { font-size: 0.8rem; color: var(--text-dim); margin-bottom: 5px; }
        .metric b { color: var(--text); display: block; font-size: 1rem; }

        .btn-refresh {
            background: var(--accent); color: #000; border: none; padding: 8px 15px;
            border-radius: 6px; font-weight: bold; cursor: pointer; font-family: var(--font-mono); font-size: 0.75rem;
        }

        /* ── Utility ── */
        .color-up { color: var(--success); }
        .color-down { color: var(--danger); }
    </style>
</head>
<body>

    <header>
        <div class="logo">◉ BIST COCKPIT</div>
        <div class="market-meta">
            <span id="market-idx">BIST 100: ---</span>
            <span id="market-regime" class="regime-tag">---</span>
            <span id="system-clock">00:00:00</span>
        </div>
        <button class="btn-refresh" onclick="updateCockpit()">YENİLE</button>
    </header>

    <div class="cockpit-grid">
        <!-- ── SOL: Sinyal Listesi ── -->
        <div class="workspace">
            <div class="tabs-header">
                <div class="tab-btn active" onclick="switchTab('signals', this)">🚀 AL SİNYALLERİ</div>
                <div class="tab-btn" onclick="switchTab('setups', this)">⏳ SETUP</div>
                <div class="tab-btn" onclick="switchTab('watchlist', this)">👁 WATCHLIST</div>
            </div>

            <div class="table-container">
                <table id="signals-table">
                    <thead>
                        <tr>
                            <th>HISSE</th>
                            <th>FIYAT</th>
                            <th>DEGISIM</th>
                            <th>TRUST</th>
                            <th>SEKTOR</th>
                            <th>AL/SAT</th>
                            <th>QL</th>
                        </tr>
                    </thead>
                    <tbody id="cockpit-body">
                        <!-- Veriler buraya dolacak -->
                    </tbody>
                </table>
            </div>
        </div>

        <!-- ── SAĞ: Detay Paneli ── -->
        <div class="details-panel" id="details-view">
            <div class="detail-card">
                <div class="detail-header">
                    <h3 id="det-symbol">SEMBOL<span>₺0.00</span></h3>
                    <p id="det-change" style="margin:5px 0 0 0; font-size:0.9rem;">--%</p>
                </div>
                <div class="metric-grid" id="det-metrics">
                    <div class="metric">RSI <b>--</b></div>
                    <div class="metric">GÜVEN <b>--</b></div>
                    <div class="metric">EMA 9 <b>--</b></div>
                    <div class="metric">EMA 21 <b>--</b></div>
                </div>
            </div>

            <div class="detail-card">
                <h4 style="margin:0 0 10px 0; font-size:0.8rem; color:var(--text-dim)">YAPAY ZEKA ANALİZİ</h4>
                <p id="det-reason" style="font-size:0.85rem; line-height:1.4; font-family:var(--font-mono)">Bir sembol seçiniz...</p>
            </div>
        </div>
    </div>

    <script>
        let currentData = null;
        let activeTab = 'signals';

        async function updateCockpit() {
            const api_url = "https://bist-ai-terminal.onrender.com/api/status"; 
            const headerStatus = document.getElementById('market-idx');
            const body = document.getElementById('cockpit-body');
            
            try {
                if (!currentData) body.innerHTML = '<tr><td colspan="7" style="text-align:center; padding:40px; color:var(--text-dim)">⏱ Veriler yükleniyor (Render uyanıyor olabilir)...</td></tr>';
                
                headerStatus.innerText = "BIST 100: FETCHING...";
                const res = await fetch(api_url);
                if (!res.ok) throw new Error("API sunucusu hata döndürdü.");
                
                currentData = await res.json();
                
                // Top Bar
                document.getElementById('market-idx').innerText = `BIST 100: ${currentData.market.index_val} (${currentData.market.change > 0 ? '+' : ''}${currentData.market.change}%)`;
                document.getElementById('market-regime').innerText = currentData.market.regime;
                document.getElementById('market-regime').style.color = currentData.market.regime.includes('BULL') ? '#4ade80' : (currentData.market.regime.includes('BEAR') ? '#ef4444' : '#fbbf24');
                
                renderTable();
            } catch (err) { 
                console.error("API Hatası:", err);
                headerStatus.innerText = "BIST 100: BAĞLANTI HATASI";
                body.innerHTML = `<tr><td colspan="7" style="text-align:center; padding:40px; color:var(--danger)">⚠️ Veri alınamadı. Render sunucusu hala uyanıyor olabilir. Lütfen 1 dakika sonra tekrar yenileyiniz.</td></tr>`;
            }
        }

        function switchTab(tab, el) {
            activeTab = tab;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
            renderTable();
        }

        function renderTable() {
            if(!currentData) return;
            const body = document.getElementById('cockpit-body');
            body.innerHTML = '';
            
            const list = currentData[activeTab] || [];
            if (list.length === 0) {
                body.innerHTML = `<tr><td colspan="7" style="text-align:center; padding:40px; color:var(--text-dim)">Bu kategoride şu an aktif hisse bulunmamaktadır.</td></tr>`;
                return;
            }

            list.forEach(sig => {
                const tr = document.createElement('tr');
                tr.onclick = (e) => selectSymbol(sig, tr);
                tr.innerHTML = `
                    <td style="font-weight:bold">${sig.symbol}</td>
                    <td>₺${sig.price}</td>
                    <td class="${sig.change >= 0 ? 'color-up' : 'color-down'}">${sig.change >= 0 ? '+' : ''}${sig.change}%</td>
                    <td>%${sig.trust}</td>
                    <td>${sig.sector}</td>
                    <td><span class="badge ${sig.action == 'AL' ? 'q-aplus' : (sig.action == 'SAT' ? 'q-b' : 'q-a')}">${sig.action}</span></td>
                    <td><span class="q-${sig.quality.toLowerCase().replace('+','plus')}">${sig.quality}</span></td>
                `;
                body.appendChild(tr);
            });
        }

        function selectSymbol(sig, rowEl) {
            document.querySelectorAll('tr').forEach(r => r.classList.remove('selected'));
            if(rowEl) rowEl.classList.add('selected');

            document.getElementById('det-symbol').innerHTML = `${sig.symbol} <span>₺${sig.price}</span>`;
            document.getElementById('det-change').innerText = `${sig.change >= 0 ? '+' : ''}${sig.change}%`;
            document.getElementById('det-change').className = sig.change >= 0 ? 'color-up' : 'color-down';
            
            const metrics = document.getElementById('det-metrics');
            metrics.innerHTML = `
                <div class="metric">RSI <b>${sig.rsi}</b></div>
                <div class="metric">GÜVEN <b>%${sig.trust}</b></div>
                <div class="metric">EMA 9 <b>₺${sig.ema9}</b></div>
                <div class="metric">EMA 21 <b>₺${sig.ema21}</b></div>
            `;
            
            document.getElementById('det-reason').innerText = 
                `${sig.symbol} için rejim ${currentData.market.regime}. ` +
                `Trend kalitesi ${sig.quality}. RSI değeri ${sig.rsi} ile ${sig.action == 'AL' ? 'pozitif' : 'nötr'} bölgede. ` +
                `Sektör: ${sig.sector}.`;
        }

        function updateClock() {
            document.getElementById('system-clock').innerText = new Date().toLocaleTimeString();
        }
        setInterval(updateClock, 1000);
        setInterval(updateCockpit, 60000); // Otomatik 1 dakikada bir güncelle
        updateCockpit();
    </script>
</body>
</html>
